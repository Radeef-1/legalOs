version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: legalos_postgres
    environment:
      POSTGRES_USER: legalos_admin
      POSTGRES_PASSWORD: legalos_secure_pwd
      POSTGRES_DB: legalos_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: legalos_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
