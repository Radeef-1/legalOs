version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: legalos_prod_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - web
    networks:
      - legalos_prod_net

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: legalos_prod_api
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      INFOBIP_API_KEY: ${INFOBIP_API_KEY}
      INFOBIP_BASE_URL: ${INFOBIP_BASE_URL}
    depends_on:
      - postgres
      - redis
    networks:
      - legalos_prod_net

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: legalos_prod_web
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_API_URL: https://api.legalos.sa/v1
    networks:
      - legalos_prod_net

  postgres:
    image: postgres:16-alpine
    container_name: legalos_prod_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - legalos_prod_net

  redis:
    image: redis:7-alpine
    container_name: legalos_prod_redis
    restart: always
    volumes:
      - redis_prod_data:/data
    networks:
      - legalos_prod_net

networks:
  legalos_prod_net:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:
